<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReadAdapt - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8 animate-[fadeIn_0.5s_ease-out]">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-sky-600">ReadAdapt</h1>
      <p id="auth-subtitle" class="text-slate-500 mt-2">Sign in to your account</p>
    </div>

    <div id="error-box" class="hidden mb-6 p-3 bg-red-50 text-red-600 rounded-lg text-sm border border-red-100"></div>

    <form id="auth-form" class="space-y-6">
      <div>
        <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
        <input type="email" id="email" required placeholder="you@example.com" 
               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none transition duration-200">
      </div>
      
      <div>
        <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input type="password" id="password" required placeholder="••••••••" 
               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none transition duration-200">
      </div>
      
      <button type="submit" id="submit-btn" 
              class="w-full py-3 bg-sky-600 hover:bg-sky-700 text-white font-semibold rounded-lg shadow-sm hover:shadow-md transition duration-200">
        Login
      </button>
    </form>

    <div class="mt-6 text-center text-sm text-slate-500">
      <span id="switch-text">Don't have an account?</span> 
      <button id="switch-btn" class="text-sky-600 font-semibold hover:text-sky-700 hover:underline">Sign up</button>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
