<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReadAdapt - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lexend:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet"> 
 <style>
    body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
    .font-serif-brand { font-family: 'Playfair Display', serif; }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
  </style>
</head>
<body id="dynamic-body" class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">
  
  <header class="fixed top-0 left-0 right-0 z-50 bg-white/90 backdrop-blur border-b border-slate-200 px-6 py-4 shadow-sm">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      
      <!-- Left: User Menu -->
      <div class="relative">
        <button id="user-menu-btn" class="flex items-center gap-2 hover:bg-slate-100 p-2 pr-4 rounded-full transition border border-transparent hover:border-slate-200">
          <div class="w-10 h-10 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center font-bold">
            <i data-lucide="user" class="w-5 h-5"></i>
          </div>
          <span id="nav-username" class="font-medium text-slate-700 hidden md:block">...</span>
        </button>
        <div id="user-dropdown" class="hidden absolute left-0 mt-2 w-48 bg-white border border-slate-200 rounded-xl shadow-lg py-2">
          <div class="px-4 py-2 border-b border-slate-100">
            <p id="user-info" class="text-sm font-medium text-slate-700 truncate">...</p>
          </div>
          <button id="profile-btn" class="w-full text-left px-4 py-2 text-sm text-slate-600 hover:bg-slate-50 flex items-center gap-2"><i data-lucide="settings" class="w-4 h-4"></i> Profile</button>
          <button id="logout-btn" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-slate-50 flex items-center gap-2"><i data-lucide="log-out" class="w-4 h-4"></i> Log Out</button>
        </div>
      </div>

      <!-- Center: Brand -->
      <div class="flex-1 flex justify-center">
        <h1 class="text-3xl font-serif-brand font-bold text-sky-600 tracking-tight">ReadAdapt</h1>
      </div>

      <!-- Right: History -->
      <div>
        <a href="/history" class="text-slate-600 hover:text-sky-600 font-medium px-4 py-2 rounded-lg hover:bg-sky-50 transition flex items-center gap-2">
          History <i data-lucide="clock" class="w-4 h-4"></i>
        </a>
      </div>

    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col items-center p-6 mt-20 md:mt-28 w-full max-w-7xl mx-auto">
    
    <!-- Search Section -->
<div class="w-full max-w-4xl mx-auto bg-white p-8 md:p-10 rounded-3xl shadow-sm border border-slate-200 text-center relative overflow-hidden mb-8">      <h2 class="text-2xl font-bold text-slate-800 mb-6 relative z-10">What would you like to study today?</h2>
      
      <div class="flex flex-col md:flex-row items-center gap-4 relative z-10">
        <input type="text" id="search-topic" placeholder="e.g., The Solar System..." class="flex-1 w-full px-5 py-4 text-lg border border-slate-300 rounded-xl focus:ring-4 focus:ring-sky-100 focus:border-sky-500 outline-none transition">
        <select id="word-limit" class="w-full md:w-48 px-5 py-4 text-lg border border-slate-300 rounded-xl focus:ring-4 focus:ring-sky-100 focus:border-sky-500 outline-none transition appearance-none bg-white font-medium cursor-pointer">
          <option value="Concise">Concise</option>
          <option value="Regular" selected>Regular</option>
          <option value="Detailed">Detailed</option>
          <option value="Comprehensive">Comprehensive</option>
          <option value="Profound">Profound</option>
          <option value="Very Long">Very Long</option>
        </select>
        <button id="btn-search" class="bg-sky-600 hover:bg-sky-700 text-white text-lg px-8 py-4 rounded-xl font-bold transition shadow-md w-full md:w-auto h-full flex items-center justify-center gap-2">
          <i data-lucide="search" class="w-5 h-5"></i> Generate
        </button>
      </div>

      <div id="loading-spinner" class="hidden mt-6 text-sky-600 relative z-10">
        <i data-lucide="loader-2" class="w-8 h-8 animate-spin mx-auto"></i>
        <p class="mt-3 font-medium animate-pulse">Generating Content On Topic...</p>
      </div>
    </div>

    <!-- Content Container -->
    <div id="content-container" class="hidden w-full space-y-8 animate-fade-in-up">
      <!-- Generated Text Display -->
      <div class="bg-indigo-50/50 p-8 rounded-3xl border border-indigo-100 shadow-inner">
        <h3 id="generated-title" class="text-xl font-bold text-indigo-900 mb-4 capitalize"></h3>
        <p id="generated-content" class="text-lg md:text-xl text-slate-700 leading-relaxed"></p>
        
       <div id="dashboard-adhd-controls" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 z-50 flex items-center bg-green-600 text-white rounded-full shadow-2xl overflow-hidden transition-transform hover:scale-105">
          <button id="btn-dash-prev" class="px-5 py-3 hover:bg-green-700 transition disabled:opacity-40 disabled:cursor-not-allowed" title="Previous Sentence">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
          </button>
          
          <span class="px-2 font-bold text-lg select-none cursor-default">Sentence</span>
          
          <button id="btn-dash-next" class="px-5 py-3 hover:bg-green-700 transition" title="Next Sentence">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
          </button>
        </div>
      </div>

      <!-- Action Buttons -->
      <div id="action-buttons" class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full">
        <button id="btn-take-reading" class="group bg-white hover:bg-sky-50 border border-slate-200 hover:border-sky-300 p-6 rounded-2xl shadow-sm hover:shadow transition text-left flex items-center gap-4">
          <div class="bg-sky-100 text-sky-600 p-4 rounded-xl group-hover:scale-105 transition">
            <i data-lucide="mic" class="w-6 h-6"></i>
          </div>
          <div>
            <h3 class="text-xl font-bold text-sky-800">Reading Test</h3>
            <p class="text-sm text-slate-500">Practice reading out loud</p>
          </div>
        </button>
        
        <button id="btn-take-quiz" class="group bg-white hover:bg-indigo-50 border border-slate-200 hover:border-indigo-300 p-6 rounded-2xl shadow-sm hover:shadow transition text-left flex items-center gap-4">
          <div class="bg-indigo-100 text-indigo-600 p-4 rounded-xl group-hover:scale-105 transition">
            <i data-lucide="brain-circuit" class="w-6 h-6"></i>
          </div>
          <div>
            <h3 class="text-xl font-bold text-indigo-800">Knowledge Quiz</h3>
            <p class="text-sm text-slate-500">Test what you just read</p>
          </div>
        </button>
      </div>
    </div>

  </main>

  <script>
    lucide.createIcons();
  </script>
  <script src="/js/api.js"></script>
  <script src="/js/specifications.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
