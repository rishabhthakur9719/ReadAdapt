<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReadAdapt - History</title>
  <script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lexend:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">  <style>
    body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
    .font-serif-brand { font-family: 'Playfair Display', serif; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body id="dynamic-body" class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">
  <header class="fixed top-0 left-0 right-0 z-50 bg-white/90 backdrop-blur border-b border-slate-200 px-6 py-4 shadow-sm flex items-center justify-between">
    <a href="/dashboard" class="text-slate-600 hover:text-sky-600 font-medium px-4 py-2 rounded-lg hover:bg-slate-100 transition flex items-center gap-2">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
      Dashboard
    </a>
    <h1 class="text-3xl font-serif-brand font-bold text-sky-600 tracking-tight hidden md:block">ReadAdapt</h1>
    <div class="w-24"></div>
  </header>

  <main class="flex-1 max-w-6xl mx-auto w-full p-6 mt-24">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 flex flex-col">
        <h2 class="text-2xl font-bold text-slate-800 mb-6">Reading History</h2>
        
        <!-- Accuracy Progress Graph -->
        <div class="w-full mb-8" style="min-h: 200px">
          <canvas id="accuracyChart"></canvas>
        </div>

        <div id="reports-container" class="space-y-4">
          <p class="text-slate-500 italic">Loading...</p>
        </div>
      </div>
      <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 flex flex-col">
        <h2 class="text-2xl font-bold text-slate-800 mb-6">Quiz History</h2>
        
        <!-- Quiz Score Progress Graph -->
        <div class="w-full mb-8" style="min-h: 200px">
          <canvas id="quizChart"></canvas>
        </div>

        <div id="quizzes-container" class="space-y-4">
          <p class="text-slate-500 italic">Loading...</p>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/specifications.js"></script>
  <script src="/js/history.js"></script>
</body>
</html>
