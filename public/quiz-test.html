<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReadAdapt - Quiz Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lexend:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
    .dyslexia-mode { font-family: 'Lexend', sans-serif !important; letter-spacing: 0.05em !important; line-height: 2 !important; }
    .font-serif-brand { font-family: 'Playfair Display', serif; }
  </style>
</head>
<body id="dynamic-body" class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">
  <header class="fixed top-0 left-0 right-0 z-50 bg-white/90 backdrop-blur border-b border-slate-200 px-6 py-4 shadow-sm flex items-center justify-between">
    <a href="/dashboard" class="text-slate-600 hover:text-indigo-600 font-medium px-4 py-2 rounded-lg hover:bg-slate-100 transition flex items-center gap-2">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
      Exit Quiz
    </a>
    <h1 class="text-2xl font-bold text-indigo-700">Quiz Test</h1>
    <div class="w-24"></div>
  </header>

  <main class="flex-1 max-w-3xl mx-auto w-full p-6 mt-24">
    <div class="bg-white p-8 md:p-12 rounded-3xl shadow-sm border border-slate-200 relative">
      <h2 id="topic-title" class="text-2xl font-bold text-indigo-800 mb-8 border-b pb-4 capitalize">Loading Topic...</h2>
      
      <div id="quiz-container" class="space-y-6 min-h-[200px] flex flex-col justify-center">
        <div class="text-indigo-600 font-medium flex flex-col items-center">
            <svg class="animate-spin h-8 w-8 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Generating quiz questions...
        </div>
      </div>

      <div class="mt-10 flex justify-end gap-4 border-t pt-6" id="quiz-actions" style="display: none;">
          <button id="btn-quiz-next" class="hidden bg-indigo-100 text-indigo-700 font-bold px-8 py-3 rounded-xl hover:bg-indigo-200 transition">Next Question</button>
          <button id="submit-quiz-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-xl font-bold shadow-md hover:shadow-lg transition">Submit Quiz</button>
      </div>

      <div id="quiz-result" class="mt-8 p-6 rounded-2xl font-bold text-xl text-center hidden flex flex-col items-center">
        <span id="quiz-score-text"></span>
        <a href="/history" class="mt-4 text-sm font-medium bg-white/50 px-4 py-2 rounded-lg hover:bg-white transition cursor-pointer">View History</a>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/specifications.js"></script>
  <script src="/js/quiz-test.js"></script>
</body>
</html>
