<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReadAdapt - Onboarding</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8 animate-[fadeIn_0.5s_ease-out]">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-sky-600">Welcome to ReadAdapt</h1>
      <p class="text-slate-500 mt-2">Let's personalize your reading experience.</p>
    </div>

    <div id="error-box" class="hidden mb-6 p-3 bg-red-50 text-red-600 rounded-lg text-sm border border-red-100"></div>

    <form id="onboarding-form" class="space-y-6">
      <div>
        <label for="specification" class="block text-sm font-medium text-slate-700 mb-1">Target Specification</label>
        <select id="specification" required 
                class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none transition duration-200">
          <option value="" disabled selected>Select a target profile</option>
          <option value="Dyslexia">Dyslexia</option>
          <option value="ADHD">ADHD</option>
          <option value="Blind">Blind</option>
          <option value="Clinical">Clinical</option>
        </select>
      </div>
      
      <button type="submit" id="submit-btn" 
              class="w-full py-3 bg-sky-600 hover:bg-sky-700 text-white font-semibold rounded-lg shadow-sm hover:shadow-md transition duration-200">
        Complete Setup
      </button>
    </form>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/onboarding.js"></script>
</body>
</html>
