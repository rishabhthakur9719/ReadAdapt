<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReadAdapt - Reading Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lexend:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
    .dyslexia-mode { font-family: 'Lexend', sans-serif !important; letter-spacing: 0.1em !important; line-height: 2.2 !important; font-weight: 700 !important; }
    .font-serif-brand { font-family: 'Playfair Display', serif; }
    
    .adhd-masked-sentence { transition: opacity 0.3s ease; opacity: 0.2; }
    .adhd-active-sentence { opacity: 1.0; font-weight: 600; }
  </style>
</head>
<body id="dynamic-body" class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">
  <header class="fixed top-0 left-0 right-0 z-50 bg-white/90 backdrop-blur border-b border-slate-200 px-6 py-4 shadow-sm flex items-center justify-between">
    <a href="/dashboard" class="text-slate-600 hover:text-sky-600 font-medium px-4 py-2 rounded-lg hover:bg-slate-100 transition flex items-center gap-2">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
      Exit Test
    </a>
    <h1 class="text-2xl font-bold text-sky-700">Reading Test</h1>
    <div class="w-24"></div>
  </header>

  <main class="flex-1 max-w-6xl mx-auto w-full p-6 mt-24">
    <div class="bg-white p-8 md:p-12 rounded-3xl shadow-sm border border-slate-200 relative">
      <div class="flex justify-between items-center mb-8 border-b pb-4">
        <h2 id="topic-title" class="text-2xl font-bold text-sky-800 capitalize">Loading Topic...</h2>
        <span id="timer-display" class="text-sm font-semibold bg-sky-50 text-sky-600 px-4 py-2 rounded-full border border-sky-200 hidden">Time: Calculating</span>
      </div>
      
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <!-- Target Content Column -->
        <div class="flex flex-col">
          <h3 class="font-bold text-slate-500 mb-4 uppercase tracking-wider text-sm">Target Text</h3>
          <div id="target-passage" class="text-xl md:text-2xl leading-relaxed bg-slate-50 p-6 rounded-2xl border border-slate-200 min-h-[400px] flex items-center justify-center">
            <div class="text-sky-600 font-medium flex flex-col items-center">
                <svg class="animate-spin h-8 w-8 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Generating customized reading material...
            </div>
          </div>
          <div id="adhd-controls" class="hidden flex justify-center mt-6">
            <button id="btn-next-sentence" class="bg-amber-400 hover:bg-amber-500 text-slate-800 px-8 py-3 rounded-xl font-bold shadow-sm hover:shadow transition">Next Sentence</button>
          </div>
        </div>

        <!-- Real-Time Evaluation Column -->
        <div class="flex flex-col border-t lg:border-t-0 lg:border-l border-slate-200 pt-8 lg:pt-0 lg:pl-8">
          <h3 class="font-bold text-slate-500 mb-4 uppercase tracking-wider text-sm">Your Speech output</h3>
          <div class="flex-1 bg-sky-50/20 p-6 rounded-2xl border border-sky-100 flex flex-col items-center justify-center min-h-[400px]">
            
            <div id="transcript-preview" class="mb-8 text-lg md:text-xl font-medium text-slate-700 min-h-[150px] w-full text-center leading-relaxed"></div>

            <div class="flex flex-col items-center mt-auto">
              <button id="mic-btn" class="w-20 h-20 rounded-full bg-slate-300 text-white shadow-lg transition flex items-center justify-center cursor-not-allowed" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="currentColor" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
              </button>
              <button id="btn-finish-reading" class="hidden w-48 bg-sky-600 hover:bg-sky-700 text-white font-bold py-3 rounded-xl shadow-md transition">Finish Reading</button>
              <span id="mic-status" class="mt-4 font-medium text-slate-500 text-center">Wait for generation to complete...</span>
            </div>

          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/specifications.js"></script>
  <script src="/js/reading-test.js"></script>
</body>
</html>
